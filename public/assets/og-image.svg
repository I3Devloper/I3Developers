<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10211f"/>
      <stop offset="55%" style="stop-color:#004F62"/>
      <stop offset="100%" style="stop-color:#24586B"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#84B026;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#84B026;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative circle -->
  <circle cx="980" cy="480" r="280" fill="none" stroke="rgba(255,253,249,0.06)" stroke-width="1"/>
