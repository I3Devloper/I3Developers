  <text x="80" y="340" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#fffdf9" letter-spacing="-2">&amp; SEO Services</text>

  <!-- Subtext -->
  <text x="80" y="400" font-family="'Segoe UI', sans-serif" font-size="26" fill="rgba(255,253,249,0.72)">i3Developers · Lafayette, LA · Since 2004</text>

  <!-- Tags -->
  <rect x="80" y="448" width="170" height="40" rx="20" fill="rgba(132,176,38,0.2)" stroke="rgba(132,176,38,0.4)" stroke-width="1"/>
  <text x="165" y="473" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#84B026" text-anchor="middle">Web Design</text>

  <rect x="264" y="448" width="100" height="40" rx="20" fill="rgba(132,176,38,0.2)" stroke="rgba(132,176,38,0.4)" stroke-width="1"/>
  <text x="314" y="473" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#84B026" text-anchor="middle">SEO</text>

  <rect x="378" y="448" width="170" height="40" rx="20" fill="rgba(132,176,38,0.2)" stroke="rgba(132,176,38,0.4)" stroke-width="1"/>
  <text x="463" y="473" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#84B026" text-anchor="middle">App Dev</text>

