<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — i3Developers</title>
  <style>
    body { margin: 0; background: #10211f; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "I3Devloper/I3Developers",
          branch: "main",
          base_url: "https://i3-developers.vercel.app/api/auth",
          auth_endpoint: ""
        },
        media_folder: "public/images/blog",
        public_folder: "/images/blog",
        collections: [
          {
            name: "blog",
            label: "Blog Posts",
            folder: "src/content/blog",
            create: true,
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Meta Title (SEO)", name: "metaTitle", widget: "string" },
              { label: "Description", name: "description", widget: "text" },
              { label: "Tag", name: "tag", widget: "select", options: ["Web Design", "SEO", "Marketing", "Ecommerce", "App Development", "Branding", "Social Media", "Software"] },
              { label: "Excerpt", name: "excerpt", widget: "text" },
              { label: "Author", name: "author", widget: "string", default: "i3Developers" },
              { label: "Author Role", name: "authorRole", widget: "string", default: "Team" },
              { label: "Publish Date", name: "publishedDate", widget: "date", format: "yyyy-MM-dd" },
              { label: "Modified Date", name: "modifiedDate", widget: "date", format: "yyyy-MM-dd" },
              { label: "Keywords", name: "keywords", widget: "list", default: [] },
              { label: "Body", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
